<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPortal — Student Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#6366f1;--accent:#8b5cf6;--glass:rgba(15,23,42,0.75);--glass-border:rgba(255,255,255,0.08);--text:#f1f5f9;--text-sec:#94a3b8;--text-muted:#64748b;--border:rgba(255,255,255,0.06);--success:#10b981;--danger:#f43f5e;--warn:#f59e0b;--font:'Inter',-apple-system,sans-serif;--radius:16px;--radius-sm:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:#0a0e1a;color:var(--text);display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;}
.hidden{display:none!important;}
.bg-gradient{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(99,102,241,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 90%,rgba(139,92,246,.1) 0%,transparent 60%);z-index:0;}
.grid-overlay{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:60px 60px;z-index:0;}
nav{background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);padding:14px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--glass-border);position:sticky;top:0;z-index:100;}
.nav-brand{font-size:1.4rem;font-weight:800;display:flex;align-items:center;gap:10px;letter-spacing:-.5px;}
.nav-brand-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 12px -2px rgba(99,102,241,.4);}
.nav-brand-text{background:linear-gradient(135deg,#e0e7ff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-right{display:flex;align-items:center;gap:14px;}
.nav-user{font-weight:600;font-size:.85rem;background:rgba(99,102,241,.12);padding:7px 16px;border-radius:100px;color:#a5b4fc;border:1px solid rgba(99,102,241,.2);}
.logout-btn{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.15);padding:8px 18px;border-radius:100px;cursor:pointer;font-weight:700;font-family:var(--font);font-size:.82rem;transition:all .2s;}
.logout-btn:hover{background:rgba(244,63,94,.18);transform:scale(1.03);}
main{flex-grow:1;padding:36px 20px;max-width:1000px;margin:0 auto;width:100%;position:relative;z-index:10;animation:fadeUp .5s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.page-title h1{font-weight:800;font-size:1.8rem;letter-spacing:-.5px;}
.page-title p{color:var(--text-sec);font-weight:500;margin-top:4px;font-size:.9rem;}
.stats-row{display:flex;gap:16px;margin:24px 0;flex-wrap:wrap;}
.stat-card{flex:1;min-width:130px;background:var(--glass);backdrop-filter:blur(16px);border-radius:var(--radius);padding:18px 22px;border:1px solid var(--glass-border);display:flex;align-items:center;gap:12px;transition:all .3s;}
.stat-card:hover{border-color:rgba(99,102,241,.25);transform:translateY(-2px);}
.stat-icon{font-size:1.5rem;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(99,102,241,.1);border-radius:12px;}
.stat-val{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#e0e7ff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.stat-label{font-size:.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.dashboard-grid{display:flex;gap:24px;flex-wrap:wrap;}
.card{background:var(--glass);backdrop-filter:blur(16px);padding:26px;border-radius:20px;border:1px solid var(--glass-border);margin-bottom:22px;}
.card h3{font-weight:700;color:var(--text);margin-bottom:18px;font-size:1rem;}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border:1px solid var(--border);margin-bottom:10px;border-radius:var(--radius);transition:all .25s;gap:10px;background:rgba(255,255,255,.02);}
.list-item:hover{border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.04);transform:translateY(-2px);}
.list-item strong{color:var(--text);font-size:.95rem;font-weight:700;display:block;margin-bottom:4px;}
.list-item small{color:var(--text-muted);font-weight:500;font-size:.8rem;}
.start-btn{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border:none;padding:10px 20px;border-radius:100px;cursor:pointer;font-weight:700;font-family:var(--font);font-size:.85rem;transition:all .2s;white-space:nowrap;flex-shrink:0;box-shadow:0 4px 12px -4px rgba(99,102,241,.4);}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 18px -4px rgba(99,102,241,.5);}
.badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:.7rem;font-weight:700;text-transform:capitalize;margin-left:6px;}
.badge-easy{background:rgba(16,185,129,.12);color:#34d399;}
.badge-medium{background:rgba(245,158,11,.12);color:#fbbf24;}
.badge-hard{background:rgba(244,63,94,.12);color:#fb7185;}
.empty-msg{color:var(--text-muted);font-style:italic;font-weight:500;}
table{width:100%;border-collapse:separate;border-spacing:0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);}
th,td{padding:13px 16px;text-align:left;border-bottom:1px solid var(--border);}
th{background:rgba(255,255,255,.03);font-weight:700;color:var(--text-muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.8px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(99,102,241,.03);}
.score-chip{display:inline-block;padding:4px 12px;border-radius:100px;font-weight:700;font-size:.82rem;}
.score-pass{background:rgba(16,185,129,.12);color:#34d399;}
.score-fail{background:rgba(244,63,94,.12);color:#fb7185;}
.score-avg{background:rgba(245,158,11,.12);color:#fbbf24;}
#exam-view{max-width:720px;margin:0 auto;width:100%;}
.exam-card{background:var(--glass);backdrop-filter:blur(16px);border-radius:20px;border:1px solid var(--glass-border);overflow:hidden;}
.exam-top{background:linear-gradient(135deg,var(--primary),var(--accent));padding:24px 28px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.exam-top h2{font-weight:800;font-size:1.3rem;letter-spacing:-.3px;}
.exam-top .meta{font-size:.85rem;opacity:.8;margin-top:4px;}
.timer-box{background:rgba(255,255,255,.15);border-radius:var(--radius-sm);padding:6px 16px;font-size:1.1rem;font-weight:800;min-width:70px;text-align:center;backdrop-filter:blur(6px);transition:background .3s;}
.timer-box.warn{background:rgba(245,158,11,.3);}
.timer-box.urgent{background:rgba(244,63,94,.5);animation:pulse .6s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.progress-bar-wrap{height:4px;background:rgba(255,255,255,.1);}
.progress-bar{height:100%;background:#34d399;transition:width .4s ease;border-radius:0 4px 4px 0;}
.exam-body{padding:28px;}
.q-counter{font-size:.82rem;font-weight:600;color:var(--text-muted);margin-bottom:12px;letter-spacing:.3px;}
#question-text{font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:22px;line-height:1.6;}
.option-label{display:flex;align-items:center;padding:14px 18px;border:1px solid var(--border);margin-bottom:10px;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;font-weight:600;color:var(--text-sec);background:rgba(255,255,255,.02);}
.option-label:hover{border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.05);color:var(--text);}
input[type=radio]{margin-right:14px;width:1.1rem;height:1.1rem;accent-color:var(--primary);cursor:pointer;flex-shrink:0;}
input[type=radio]:checked+.option-label{border-color:var(--primary);background:rgba(99,102,241,.1);color:#c4b5fd;box-shadow:0 3px 10px rgba(99,102,241,.1);}
.exam-footer{display:flex;justify-content:space-between;align-items:center;padding-top:22px;border-top:1px solid var(--border);margin-top:24px;}
.nav-btn{padding:12px 28px;border-radius:100px;border:none;cursor:pointer;font-weight:700;font-family:var(--font);font-size:.95rem;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 6px 18px -6px rgba(99,102,241,.5);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 22px -6px rgba(99,102,241,.55);}
.btn-primary:disabled,.btn-success:disabled{background:#334155;box-shadow:none;transform:none;cursor:not-allowed;color:#64748b;}
.btn-success{background:var(--success);color:#fff;box-shadow:0 6px 18px -6px rgba(16,185,129,.5);}
.btn-success:hover{transform:translateY(-2px);}
#result-view{max-width:600px;margin:0 auto;width:100%;}
.result-card{background:var(--glass);backdrop-filter:blur(16px);border-radius:20px;border:1px solid var(--glass-border);padding:40px 36px;text-align:center;}
.result-emoji{font-size:3rem;margin-bottom:10px;}
.result-card h2{font-weight:800;font-size:1.7rem;letter-spacing:-.5px;margin-bottom:6px;}
.score-big{font-size:3.2rem;font-weight:900;background:linear-gradient(135deg,#e0e7ff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:14px 0 6px;}
.score-pct{font-size:1rem;font-weight:700;margin-bottom:6px;}
.score-msg{color:var(--text-sec);font-weight:500;margin-bottom:28px;}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.result-actions button{padding:12px 24px;border-radius:100px;border:none;cursor:pointer;font-weight:700;font-family:var(--font);font-size:.9rem;transition:all .2s;}
.btn-back{background:rgba(99,102,241,.1);color:#a5b4fc;border:1px solid rgba(99,102,241,.2);}
.btn-back:hover{background:rgba(99,102,241,.18);}
.btn-review{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 6px 18px -6px rgba(99,102,241,.5);}
.btn-review:hover{transform:translateY(-2px);}
.review-section{text-align:left;margin-top:10px;}
.review-section h3{font-weight:700;margin-bottom:16px;font-size:1rem;color:var(--text);}
.review-item{padding:14px 18px;border-radius:var(--radius-sm);margin-bottom:12px;border:1px solid;}
.review-correct{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.2);}
.review-incorrect{background:rgba(244,63,94,.06);border-color:rgba(244,63,94,.2);}
.review-q{font-weight:600;font-size:.9rem;color:var(--text);margin-bottom:8px;}
.review-ans{font-size:.85rem;font-weight:600;}
.review-correct .review-ans{color:#34d399;}
.review-incorrect .review-ans{color:#fb7185;}
.review-correct-ans{font-size:.82rem;font-weight:600;color:#34d399;margin-top:4px;}
@media(max-width:640px){.exam-top{flex-direction:column;gap:10px;align-items:flex-start}.dashboard-grid{flex-direction:column}.result-card{padding:28px 20px}}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="grid-overlay"></div>
<nav>
<div class="nav-brand"><div class="nav-brand-icon">🎓</div><span class="nav-brand-text">EduPortal</span></div>
<div class="nav-right"><span class="nav-user" id="user-greeting"></span><button onclick="logout()" class="logout-btn">Log Out</button></div>
</nav>
<main>
<div id="dashboard-view">
<div class="page-title"><h1>🎓 Student Portal</h1><p>View assigned exams and track your progress.</p></div>
<div class="stats-row">
<div class="stat-card"><div class="stat-icon">📝</div><div><div class="stat-val" id="stat-available">0</div><div class="stat-label">Available Exams</div></div></div>
<div class="stat-card"><div class="stat-icon">✅</div><div><div class="stat-val" id="stat-taken">0</div><div class="stat-label">Exams Taken</div></div></div>
<div class="stat-card"><div class="stat-icon">🎯</div><div><div class="stat-val" id="stat-avg">—</div><div class="stat-label">My Avg Score</div></div></div>
<div class="stat-card"><div class="stat-icon">🏆</div><div><div class="stat-val" id="stat-best">—</div><div class="stat-label">Best Score</div></div></div>
</div>
<div class="dashboard-grid">
<div class="card" style="flex:1;min-width:280px"><h3>📝 Assigned Examinations</h3><div id="student-exams-list"></div></div>
<div class="card" style="flex:1;min-width:280px"><h3>🏆 My Results</h3><table><thead><tr><th>Exam</th><th>Score</th><th>%</th></tr></thead><tbody id="student-results-list"></tbody></table></div>
</div>
</div>
<div id="exam-view" class="hidden">
<div class="exam-card">
<div class="exam-top"><div><h2 id="active-exam-title">Exam</h2><div class="meta" id="exam-meta"></div></div><div class="timer-box" id="timer-display">⏱ --:--</div></div>
<div class="progress-bar-wrap"><div id="exam-progress-bar" class="progress-bar"></div></div>
<div class="exam-body">
<div class="q-counter" id="exam-progress-text"></div>
<div id="question-text"></div>
<div id="options-container"></div>
<div class="exam-footer">
<span id="timer-label" style="font-weight:600;color:var(--text-muted);font-size:.85rem"></span>
<div style="display:flex;gap:10px">
<button id="next-btn" class="nav-btn btn-primary" disabled>Next →</button>
<button id="submit-btn" class="nav-btn btn-success hidden" disabled>Submit Exam ✓</button>
</div>
</div>
</div>
</div>
</div>
<div id="result-view" class="hidden">
<div class="result-card">
<div class="result-emoji" id="result-emoji">🎉</div>
<h2>Exam Complete!</h2>
<div class="score-big" id="result-score"></div>
<div class="score-pct" id="result-pct"></div>
<div class="score-msg" id="result-msg"></div>
<div class="result-actions">
<button class="btn-back" onclick="returnToDash()">← Dashboard</button>
<button class="btn-review" onclick="toggleReview()">📋 Review Answers</button>
</div>
<div class="review-section hidden" id="review-section"><h3>Answer Review</h3><div id="review-list"></div></div>
</div>
</div>
</main>
<script>
const currentUser=JSON.parse(localStorage.getItem('portal_user'));
if(!currentUser||currentUser.role!=='student'){window.location.replace('login.html')}
else{document.getElementById('user-greeting').innerText='👋 '+currentUser.name}
let examsDB=JSON.parse(localStorage.getItem('portal_exams'))||[];
let resultsDB=JSON.parse(localStorage.getItem('portal_results'))||[];
let activeExam=null,currentQIndex=0,studentAnswers=[],timerInterval=null,secondsLeft=0;
function logout(){localStorage.removeItem('portal_user');window.location.replace('login.html')}
function showView(id){['dashboard-view','exam-view','result-view'].forEach(v=>document.getElementById(v).classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}
function renderStats(){
const myR=resultsDB.filter(r=>r.studentName===currentUser.name);const takenIds=myR.map(r=>r.examId);
document.getElementById('stat-available').textContent=examsDB.filter(e=>!takenIds.includes(e.id)).length;
document.getElementById('stat-taken').textContent=myR.length;
if(myR.length===0){document.getElementById('stat-avg').textContent='—';document.getElementById('stat-best').textContent='—';return}
const pcts=myR.map(r=>Math.round((r.score/r.total)*100));
document.getElementById('stat-avg').textContent=Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length)+'%';
document.getElementById('stat-best').textContent=Math.max(...pcts)+'%';
}
function renderDashboard(){
renderStats();
const myR=resultsDB.filter(r=>r.studentName===currentUser.name);const takenIds=myR.map(r=>r.examId);
const available=examsDB.filter(e=>!takenIds.includes(e.id));
const examsEl=document.getElementById('student-exams-list');
examsEl.innerHTML=available.length===0?'<p class="empty-msg">🎉 You\'re all caught up! No new exams.</p>':available.map(exam=>`
<div class="list-item"><div><strong>${exam.title}<span class="badge badge-${exam.difficulty||'easy'}">${exam.difficulty||'N/A'}</span></strong>
<small>By ${exam.teacherName} • ${exam.questions.length} Qs • ${exam.category||''}</small></div>
<button class="start-btn" onclick="startExam('${exam.id}')">Start →</button></div>`).join('');
const resultsEl=document.getElementById('student-results-list');
const mine=[...resultsDB].reverse().filter(r=>r.studentName===currentUser.name);
resultsEl.innerHTML=mine.length===0?'<tr><td colspan="3" class="empty-msg" style="padding:14px">No past exams yet.</td></tr>':mine.map(r=>{
const pct=Math.round((r.score/r.total)*100);const cls=pct>=70?'score-pass':pct>=50?'score-avg':'score-fail';
return `<tr><td><strong>${r.examTitle}</strong></td><td>${r.score}/${r.total}</td><td><span class="score-chip ${cls}">${pct}%</span></td></tr>`;}).join('');
}
function startTimer(t){secondsLeft=t;updateTimerDisplay();timerInterval=setInterval(()=>{secondsLeft--;updateTimerDisplay();if(secondsLeft<=0){clearInterval(timerInterval);submitExam()}},1000)}
function updateTimerDisplay(){const m=Math.floor(secondsLeft/60).toString().padStart(2,'0');const s=(secondsLeft%60).toString().padStart(2,'0');const el=document.getElementById('timer-display');el.textContent=`⏱ ${m}:${s}`;el.className='timer-box'+(secondsLeft<=30?' urgent':secondsLeft<=60?' warn':'');document.getElementById('timer-label').textContent=secondsLeft<=60?'⚠️ Time running out!':''}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}}
function startExam(id){
activeExam=examsDB.find(e=>e.id===id);if(!activeExam)return;
currentQIndex=0;studentAnswers=[];
document.getElementById('active-exam-title').textContent=activeExam.title;
document.getElementById('exam-meta').textContent=`${activeExam.questions.length} questions • ${activeExam.difficulty||''} • ${activeExam.category||''}`;
showView('exam-view');startTimer(activeExam.questions.length*45);renderQuestion();
}
function renderQuestion(){
const q=activeExam.questions[currentQIndex];const total=activeExam.questions.length;
document.getElementById('exam-progress-text').textContent=`Question ${currentQIndex+1} of ${total}`;
document.getElementById('exam-progress-bar').style.width=`${((currentQIndex+1)/total)*100}%`;
document.getElementById('question-text').textContent=q.questionText;
document.getElementById('options-container').innerHTML=q.options.map((opt,i)=>`
<input type="radio" id="opt-${i}" name="opt" value="${opt.replace(/"/g,'&quot;')}" onchange="selectOpt(this.value)" style="display:none">
<label class="option-label" for="opt-${i}">${opt}</label>`).join('');
const isLast=currentQIndex===total-1;const nB=document.getElementById('next-btn');const sB=document.getElementById('submit-btn');
nB.disabled=true;sB.disabled=true;nB.classList.toggle('hidden',isLast);sB.classList.toggle('hidden',!isLast);
if(studentAnswers[currentQIndex]){const saved=studentAnswers[currentQIndex];document.querySelectorAll('input[name=opt]').forEach(r=>{if(r.value===saved)r.checked=true});nB.disabled=false;sB.disabled=false}
}
window.selectOpt=function(val){studentAnswers[currentQIndex]=val;document.getElementById('next-btn').disabled=false;document.getElementById('submit-btn').disabled=false};
document.getElementById('next-btn').addEventListener('click',()=>{currentQIndex++;renderQuestion()});
document.getElementById('submit-btn').addEventListener('click',submitExam);
function submitExam(){
stopTimer();let score=0;
activeExam.questions.forEach((q,i)=>{if(q.correctAnswer===studentAnswers[i])score++});
const total=activeExam.questions.length;const pct=Math.round((score/total)*100);
const record={studentName:currentUser.name,examId:activeExam.id,examTitle:activeExam.title,score,total,answers:studentAnswers,timestamp:Date.now()};
resultsDB.push(record);localStorage.setItem('portal_results',JSON.stringify(resultsDB));
document.getElementById('result-score').textContent=`${score} / ${total}`;
const cls=pct>=70?'score-pass':pct>=50?'score-avg':'score-fail';
document.getElementById('result-pct').innerHTML=`<span class="score-chip ${cls}">${pct}%</span>`;
document.getElementById('result-emoji').textContent=pct>=80?'🏆':pct>=50?'🎉':'📚';
document.getElementById('result-msg').textContent=pct>=80?'Outstanding performance! Keep it up.':pct>=50?'Good job! You passed the exam.':'Keep practicing — you can do better!';
document.getElementById('review-list').innerHTML=activeExam.questions.map((q,i)=>{
const ans=studentAnswers[i]||'(No answer)';const correct=ans===q.correctAnswer;
return `<div class="review-item ${correct?'review-correct':'review-incorrect'}">
<div class="review-q">Q${i+1}. ${q.questionText}</div>
<div class="review-ans">${correct?'✅':'❌'} Your answer: ${ans}</div>
${!correct?`<div class="review-correct-ans">✅ Correct: ${q.correctAnswer}</div>`:''}
</div>`;}).join('');
showView('result-view');
}
function toggleReview(){const sec=document.getElementById('review-section');const btn=document.querySelector('.btn-review');const h=sec.classList.toggle('hidden');btn.textContent=h?'📋 Review Answers':'🔼 Hide Review'}
function returnToDash(){activeExam=null;renderDashboard();showView('dashboard-view')}
renderDashboard();
</script>
</body>
</html>
