<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal — Educator Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#6366f1;--accent:#8b5cf6;--glass:rgba(15,23,42,0.75);--glass-border:rgba(255,255,255,0.08);
            --text:#f1f5f9;--text-sec:#94a3b8;--text-muted:#64748b;--border:rgba(255,255,255,0.06);
            --success:#10b981;--danger:#f43f5e;--warn:#f59e0b;--font:'Inter',-apple-system,sans-serif;
            --radius:16px;--radius-sm:12px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:var(--font);background:#0a0e1a;color:var(--text);display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;}

        /* BG */
        .bg-gradient{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(99,102,241,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 90%,rgba(139,92,246,.1) 0%,transparent 60%);z-index:0;}
        .grid-overlay{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:60px 60px;z-index:0;}

        /* NAV */
        nav{background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);padding:14px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--glass-border);position:sticky;top:0;z-index:100;}
        .nav-brand{font-size:1.4rem;font-weight:800;display:flex;align-items:center;gap:10px;letter-spacing:-.5px;}
        .nav-brand-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 12px -2px rgba(99,102,241,.4);}
        .nav-brand-text{background:linear-gradient(135deg,#e0e7ff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .nav-right{display:flex;align-items:center;gap:14px;}
        .nav-user{font-weight:600;font-size:.85rem;background:rgba(99,102,241,.12);padding:7px 16px;border-radius:100px;color:#a5b4fc;border:1px solid rgba(99,102,241,.2);}
        .logout-btn{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.15);padding:8px 18px;border-radius:100px;cursor:pointer;font-weight:700;font-family:var(--font);font-size:.82rem;transition:all .2s;}
        .logout-btn:hover{background:rgba(244,63,94,.18);transform:scale(1.03);}

        main{flex-grow:1;padding:36px 24px;max-width:1100px;margin:0 auto;width:100%;position:relative;z-index:10;animation:fadeUp .5s ease-out;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        .page-title h1{font-weight:800;font-size:1.8rem;letter-spacing:-.5px;display:flex;align-items:center;gap:10px;}
        .page-title p{color:var(--text-sec);font-weight:500;margin-top:4px;font-size:.9rem;}

        /* STATS */
        .stats-row{display:flex;gap:16px;margin:28px 0;flex-wrap:wrap;}
        .stat-card{flex:1;min-width:140px;background:var(--glass);backdrop-filter:blur(16px);border-radius:var(--radius);padding:20px 22px;border:1px solid var(--glass-border);display:flex;align-items:center;gap:14px;transition:all .3s;position:relative;overflow:hidden;}
        .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);}
        .stat-card:hover{border-color:rgba(99,102,241,.25);transform:translateY(-2px);box-shadow:0 8px 24px -8px rgba(0,0,0,.3);}
        .stat-icon{font-size:1.7rem;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(99,102,241,.1);border-radius:12px;}
        .stat-info .stat-val{font-size:1.7rem;font-weight:800;background:linear-gradient(135deg,#e0e7ff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
        .stat-info .stat-label{font-size:.72rem;font-weight:600;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;}

        /* CARDS */
        .dashboard-grid{display:flex;gap:24px;flex-wrap:wrap;}
        .card{background:var(--glass);backdrop-filter:blur(16px);padding:28px;border-radius:20px;border:1px solid var(--glass-border);margin-bottom:24px;position:relative;overflow:hidden;}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);}
        .card h3{font-weight:700;color:var(--text);margin-bottom:22px;font-size:1rem;display:flex;align-items:center;gap:8px;letter-spacing:-.2px;}

        /* FORM */
        .form-col{flex:1;min-width:280px;}
        label{display:block;font-weight:600;margin-bottom:7px;font-size:.82rem;color:var(--text-sec);letter-spacing:.3px;}
        input[type="text"],input[type="number"],select{width:100%;padding:12px 14px;margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:.9rem;font-weight:500;color:var(--text);transition:all .3s;outline:none;background:rgba(255,255,255,.03);}
        input::placeholder{color:var(--text-muted);}
        input:focus,select:focus{border-color:var(--primary);background:rgba(99,102,241,.05);box-shadow:0 0 0 3px rgba(99,102,241,.12);}
        select option{background:#1e293b;color:var(--text);}

        .generate-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;font-weight:700;font-family:var(--font);transition:all .3s;box-shadow:0 8px 24px -8px rgba(99,102,241,.5);position:relative;overflow:hidden;letter-spacing:.3px;}
        .generate-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.1),transparent);transform:translateX(-100%);transition:transform .5s;}
        .generate-btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px -8px rgba(99,102,241,.6);}
        .generate-btn:hover::before{transform:translateX(100%);}
        .generate-btn:disabled{background:#334155;box-shadow:none;transform:none;cursor:not-allowed;color:#64748b;}

        /* EXAMS LIST */
        .content-col{flex:2;min-width:340px;}
        .list-item{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border:1px solid var(--border);margin-bottom:10px;border-radius:var(--radius);transition:all .25s;gap:12px;background:rgba(255,255,255,.02);}
        .list-item:hover{border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.04);transform:translateX(4px);}
        .list-item-info strong{color:var(--text);font-size:.95rem;font-weight:700;display:block;margin-bottom:4px;}
        .list-item-info small{color:var(--text-muted);font-weight:500;font-size:.8rem;}
        .list-item-info .teacher-tag{font-size:.82rem;color:#a5b4fc;margin:3px 0;font-weight:600;}
        .badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:.7rem;font-weight:700;text-transform:capitalize;margin-left:6px;}
        .badge-easy{background:rgba(16,185,129,.12);color:#34d399;}
        .badge-medium{background:rgba(245,158,11,.12);color:#fbbf24;}
        .badge-hard{background:rgba(244,63,94,.12);color:#fb7185;}
        .delete-btn{background:rgba(244,63,94,.08);color:#fb7185;border:1px solid rgba(244,63,94,.12);padding:8px 16px;border-radius:100px;cursor:pointer;font-weight:700;font-size:.8rem;font-family:var(--font);transition:all .2s;white-space:nowrap;flex-shrink:0;}
        .delete-btn:hover{background:rgba(244,63,94,.15);transform:scale(1.04);}
        .empty-msg{color:var(--text-muted);font-style:italic;font-weight:500;padding:10px 0;}

        /* TABLE */
        table{width:100%;border-collapse:separate;border-spacing:0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);}
        th,td{padding:13px 16px;text-align:left;border-bottom:1px solid var(--border);}
        th{background:rgba(255,255,255,.03);font-weight:700;color:var(--text-muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.8px;}
        tr:last-child td{border-bottom:none;}
        tr:hover td{background:rgba(99,102,241,.03);}
        .score-chip{display:inline-block;padding:4px 12px;border-radius:100px;font-weight:700;font-size:.82rem;}
        .score-pass{background:rgba(16,185,129,.12);color:#34d399;}
        .score-fail{background:rgba(244,63,94,.12);color:#fb7185;}
        .score-avg{background:rgba(245,158,11,.12);color:#fbbf24;}

        /* TOAST */
        .toast-container{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;}
        .toast{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);padding:14px 24px 14px 18px;border-radius:var(--radius-sm);color:var(--text);font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:10px;box-shadow:0 12px 40px -8px rgba(0,0,0,.5);animation:toastIn .3s ease-out;min-width:280px;}
        .toast.leaving{animation:toastOut .3s ease-in forwards;}
        .toast-success{border-left:3px solid var(--success);}
        .toast-danger{border-left:3px solid var(--danger);}
        @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}

        @media(max-width:768px){.dashboard-grid{flex-direction:column;}.stats-row{gap:10px;}}
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>
    <div class="toast-container" id="toast-container"></div>

    <nav>
        <div class="nav-brand"><div class="nav-brand-icon">🎓</div><span class="nav-brand-text">EduPortal</span></div>
        <div class="nav-right">
            <span class="nav-user" id="user-greeting"></span>
            <button onclick="logout()" class="logout-btn">Log Out</button>
        </div>
    </nav>

    <main>
        <div class="page-title">
            <h1>📋 Educator Dashboard</h1>
            <p>Create and manage institutional examinations.</p>
        </div>

        <div class="stats-row">
            <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-info"><div class="stat-val" id="stat-exams">0</div><div class="stat-label">Active Exams</div></div></div>
            <div class="stat-card"><div class="stat-icon">📝</div><div class="stat-info"><div class="stat-val" id="stat-submissions">0</div><div class="stat-label">Submissions</div></div></div>
            <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-info"><div class="stat-val" id="stat-avg">—</div><div class="stat-label">Avg. Score</div></div></div>
            <div class="stat-card"><div class="stat-icon">🏅</div><div class="stat-info"><div class="stat-val" id="stat-pass">—</div><div class="stat-label">Pass Rate</div></div></div>
        </div>

        <div class="dashboard-grid">
            <div class="form-col">
                <div class="card">
                    <h3>✨ Generate New Exam</h3>
                    <form id="create-exam-form">
                        <label>Exam Title</label>
                        <input type="text" id="exam-title" required placeholder="e.g. Midterm Computing">
                        <label>Category</label>
                        <select id="exam-category">
                            <option value="9">🌍 General Knowledge</option>
                            <option value="18">💻 Science: Computers</option>
                            <option value="19">➗ Mathematics</option>
                            <option value="17">🔬 Science & Nature</option>
                            <option value="23">📜 History</option>
                            <option value="21">⚽ Sports</option>
                        </select>
                        <label>Difficulty</label>
                        <select id="exam-difficulty">
                            <option value="easy">🟢 Easy</option>
                            <option value="medium">🟡 Medium</option>
                            <option value="hard">🔴 Hard</option>
                        </select>
                        <label>Number of Questions</label>
                        <input type="number" id="exam-amount" min="3" max="20" value="10" required>
                        <button type="submit" id="generate-btn" class="generate-btn">⚡ Generate & Publish Exam</button>
                    </form>
                </div>
            </div>

            <div class="content-col">
                <div class="card">
                    <h3>📚 Active Examinations</h3>
                    <div id="teacher-exams-list"></div>
                </div>
                <div class="card">
                    <h3>📊 Student Submissions</h3>
                    <div id="teacher-results-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function showToast(msg, type='success') {
            const c = document.getElementById('toast-container'), t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.innerHTML = `<span>${type==='success'?'✅':'❌'}</span><span>${msg}</span>`;
            c.appendChild(t);
            setTimeout(() => { t.classList.add('leaving'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        const currentUser = JSON.parse(localStorage.getItem('portal_user'));
        if (!currentUser || currentUser.role !== 'teacher') { window.location.replace('login.html'); }
        else { document.getElementById('user-greeting').innerText = '👋 ' + currentUser.name; }

        let examsDB = JSON.parse(localStorage.getItem('portal_exams')) || [];
        let resultsDB = JSON.parse(localStorage.getItem('portal_results')) || [];

        function logout() { localStorage.removeItem('portal_user'); window.location.replace('login.html'); }

        function decode(html) { const txt = document.createElement('textarea'); txt.innerHTML = html; return txt.value; }

        function renderStats() {
            document.getElementById('stat-exams').textContent = examsDB.length;
            document.getElementById('stat-submissions').textContent = resultsDB.length;
            if (resultsDB.length === 0) { document.getElementById('stat-avg').textContent = '—'; document.getElementById('stat-pass').textContent = '—'; return; }
            let totalPct = 0, passes = 0;
            resultsDB.forEach(r => { const pct = (r.score / r.total) * 100; totalPct += pct; if (pct >= 50) passes++; });
            document.getElementById('stat-avg').textContent = Math.round(totalPct / resultsDB.length) + '%';
            document.getElementById('stat-pass').textContent = Math.round((passes / resultsDB.length) * 100) + '%';
        }

        function renderDashboard() {
            renderStats();
            const examsEl = document.getElementById('teacher-exams-list');
            if (examsDB.length === 0) {
                examsEl.innerHTML = `<p class="empty-msg">No active exams. Create one to get started.</p>`;
            } else {
                examsEl.innerHTML = examsDB.map(exam => `
                    <div class="list-item">
                        <div class="list-item-info">
                            <strong>${exam.title}<span class="badge badge-${exam.difficulty}">${exam.difficulty}</span></strong>
                            <div class="teacher-tag">👨‍🏫 Created by ${exam.teacherName}</div>
                            <small>${exam.questions.length} Qs • ${exam.category} • Created ${exam.dateCreated}</small>
                        </div>
                        <button class="delete-btn" onclick="deleteExam('${exam.id}')">🗑 Remove</button>
                    </div>`).join('');
            }

            const resultsEl = document.getElementById('teacher-results-list');
            if (resultsDB.length === 0) {
                resultsEl.innerHTML = `<p class="empty-msg" style="padding:16px">Awaiting student submissions…</p>`;
            } else {
                const grouped = {};
                [...resultsDB].reverse().forEach(r => { if (!grouped[r.examId]) grouped[r.examId] = []; grouped[r.examId].push(r); });
                resultsEl.innerHTML = Object.keys(grouped).map(examId => {
                    const examResults = grouped[examId];
                    const examTitle = examResults[0].examTitle;
                    const exam = examsDB.find(e => e.id === examId);
                    const teacherName = exam ? exam.teacherName : 'Unknown';
                    const rows = examResults.map(r => {
                        const pct = Math.round((r.score / r.total) * 100);
                        const cls = pct >= 70 ? 'score-pass' : pct >= 50 ? 'score-avg' : 'score-fail';
                        return `<tr><td><strong>${r.studentName}</strong></td><td>${r.score} / ${r.total}</td><td><span class="score-chip ${cls}">${pct}%</span></td></tr>`;
                    }).join('');
                    return `<div style="margin-bottom:24px;">
                        <h4 style="margin-bottom:12px;color:#a5b4fc;font-size:1rem;">${examTitle} <span style="font-size:.8em;color:var(--text-muted);font-weight:500;">(by ${teacherName})</span></h4>
                        <table><thead><tr><th>Student</th><th>Score</th><th>%</th></tr></thead><tbody>${rows}</tbody></table>
                    </div>`;
                }).join('');
            }
        }

        document.getElementById('create-exam-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('generate-btn');
            btn.textContent = '⏳ Curating Questions…'; btn.disabled = true;
            const title = document.getElementById('exam-title').value.trim();
            const category = document.getElementById('exam-category');
            const categoryId = category.value;
            const categoryName = category.options[category.selectedIndex].text.replace(/^.{2}/, '').trim();
            const difficulty = document.getElementById('exam-difficulty').value;
            const amount = document.getElementById('exam-amount').value;
            try {
                const url = `https://opentdb.com/api.php?amount=${amount}&category=${categoryId}&difficulty=${difficulty}&type=multiple`;
                const res = await fetch(url); const data = await res.json();
                if (!data.results || data.results.length === 0) {
                    showToast('Not enough questions found. Try changing category or difficulty.', 'danger');
                    btn.textContent = '⚡ Generate & Publish Exam'; btn.disabled = false; return;
                }
                const newExam = {
                    id: Math.random().toString(36).substr(2, 9), title, category: categoryName, difficulty,
                    dateCreated: new Date().toLocaleDateString(), teacherName: currentUser.name,
                    questions: data.results.map(q => {
                        const options = [...q.incorrect_answers.map(decode), decode(q.correct_answer)].sort(() => Math.random() - 0.5);
                        return { questionText: decode(q.question), options, correctAnswer: decode(q.correct_answer) };
                    })
                };
                examsDB.push(newExam); localStorage.setItem('portal_exams', JSON.stringify(examsDB));
                e.target.reset(); renderDashboard();
                showToast(`"${title}" published successfully!`, 'success');
            } catch (err) { showToast('Error connecting to question database.', 'danger'); }
            btn.textContent = '⚡ Generate & Publish Exam'; btn.disabled = false;
        });

        function deleteExam(id) {
            if (!confirm('Permanently delete this exam and its results?')) return;
            examsDB = examsDB.filter(e => e.id !== id);
            resultsDB = resultsDB.filter(r => r.examId !== id);
            localStorage.setItem('portal_exams', JSON.stringify(examsDB));
            localStorage.setItem('portal_results', JSON.stringify(resultsDB));
            renderDashboard();
            showToast('Exam deleted successfully.', 'success');
        }

        renderDashboard();
    </script>
</body>
</html>
