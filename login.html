<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal — Sign In</title>
    <meta name="description" content="Sign in to the EduPortal online examination platform.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #8b5cf6;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.06);
            --danger: #f43f5e;
            --success: #10b981;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius: 16px;
            --radius-sm: 12px;
            --shadow-glow: 0 0 80px -20px rgba(99, 102, 241, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: #0a0e1a;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Animated Background ── */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(59, 130, 246, 0.06) 0%, transparent 60%);
            z-index: 0;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: orbFloat 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3), transparent 70%);
            top: -200px;
            left: -200px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.25), transparent 70%);
            bottom: -150px;
            right: -150px;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2), transparent 70%);
            top: 40%;
            left: 60%;
            animation-delay: -14s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.05); }
            50% { transform: translate(-15px, 25px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }

        /* ── Nav ── */
        nav {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            padding: 16px 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
            z-index: 10;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px -2px rgba(99, 102, 241, 0.4);
        }

        .nav-brand-text {
            background: linear-gradient(135deg, #e0e7ff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Main ── */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-badge {
            background: rgba(99, 102, 241, 0.1);
            color: #a5b4fc;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Card ── */
        .card {
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(1.8);
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            padding: 44px 40px;
            border-radius: 24px;
            width: 100%;
            border: 1px solid var(--glass-border);
            box-shadow:
                var(--shadow-glow),
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .card-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .card-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
            box-shadow: 0 12px 32px -8px rgba(99, 102, 241, 0.5);
            position: relative;
        }

        .card-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.5), rgba(139, 92, 246, 0.5));
            z-index: -1;
            filter: blur(12px);
            opacity: 0.5;
        }

        h2 {
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .card-header p {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            pointer-events: none;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 14px 18px 14px 46px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            background: rgba(255, 255, 255, 0.03);
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        input[type="text"]:focus ~ .input-icon,
        select:focus ~ .input-icon {
            opacity: 1;
        }

        select option {
            background: #1e293b;
            color: var(--text);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px -8px rgba(99, 102, 241, 0.5);
            margin-top: 6px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px -8px rgba(99, 102, 241, 0.6);
        }

        .submit-btn:hover::before {
            transform: translateX(100%);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 28px 0 20px;
        }

        .reset-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0 auto;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            color: var(--danger);
            background: rgba(244, 63, 94, 0.08);
        }

        /* ── Role Cards ── */
        .roles-row {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        .role-card {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text-secondary);
            transition: all 0.3s;
            cursor: default;
        }

        .role-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
        }

        .role-card span {
            display: block;
            font-size: 1.6rem;
            margin-bottom: 6px;
        }

        .role-card small {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 14px 24px 14px 18px;
            border-radius: var(--radius-sm);
            color: var(--text);
            font-weight: 600;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 12px 40px -8px rgba(0, 0, 0, 0.5);
            animation: toastIn 0.3s ease-out;
            min-width: 280px;
        }

        .toast.leaving {
            animation: toastOut 0.3s ease-in forwards;
        }

        .toast-danger {
            border-left: 3px solid var(--danger);
        }

        .toast-success {
            border-left: 3px solid var(--success);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(40px); }
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 16px;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            position: relative;
            z-index: 10;
        }

        @media(max-width:480px) {
            .card {
                padding: 32px 24px;
            }

            h2 {
                font-size: 1.5rem;
            }

            .roles-row {
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="toast-container" id="toast-container"></div>

    <nav>
        <div class="nav-brand">
            <div class="nav-brand-icon">🎓</div>
            <span class="nav-brand-text">EduPortal</span>
        </div>
    </nav>

    <main>
        <div class="login-wrapper">
            <div class="top-badge">Online Examination System</div>
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">🔑</div>
                    <h2>Welcome Back</h2>
                    <p>Sign in to access your learning portal</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-name">Full Name</label>
                        <div class="input-wrap">
                            <input type="text" id="login-name" required placeholder="e.g. Jane Doe" autocomplete="off">
                            <span class="input-icon">👤</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="login-role">Your Role</label>
                        <div class="input-wrap">
                            <select id="login-role">
                                <option value="student">🎓  Student</option>
                                <option value="teacher">📋  Teacher / Educator</option>
                            </select>
                            <span class="input-icon">🔖</span>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Continue to Dashboard →</button>
                </form>
                <hr class="divider">
                <button onclick="forceReset()" class="reset-btn">⚠️ Reset All App Data</button>
            </div>
            <div class="roles-row">
                <div class="role-card">
                    <span>🎓</span>
                    Student
                    <small>Take exams & track progress</small>
                </div>
                <div class="role-card">
                    <span>📋</span>
                    Educator
                    <small>Create & manage exams</small>
                </div>
            </div>
        </div>
    </main>

    <div class="footer">© 2026 EduPortal · Online Examination System</div>

    <script>
        // ── Toast System ──
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icon = type === 'success' ? '✅' : type === 'danger' ? '❌' : 'ℹ️';
            toast.innerHTML = `<span>${icon}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('leaving');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        const currentUser = JSON.parse(localStorage.getItem('portal_user'));
        if (currentUser) {
            window.location.replace(currentUser.role === 'teacher' ? 'teacher.html' : 'student.html');
        }

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('login-name').value.trim();
            const role = document.getElementById('login-role').value;
            if (!name) return;
            localStorage.setItem('portal_user', JSON.stringify({ name, role }));
            window.location.replace(role === 'teacher' ? 'teacher.html' : 'student.html');
        });

        function forceReset() {
            if (confirm('This will clear ALL exams and results. Continue?')) {
                localStorage.clear();
                showToast('All data has been cleared', 'success');
                setTimeout(() => window.location.reload(), 1000);
            }
        }
    </script>
</body>

</html>
